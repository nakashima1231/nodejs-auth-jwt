<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #004D61, #007a9c);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

h2 {
    color: #004D61;
    margin-bottom: 10px;
}

p {
    color: #333;
}

button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #004D61;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #006b85;
}
</style>
</head>
<body>

<div class="card">
    <h2>Bem-vindo 👋</h2>

    <p><strong>Nome:</strong> <span id="name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>

    <button onclick="logout()">Sair</button>
</div>

<script>
    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "index.html";
    }

const name = localStorage.getItem("name");
const email = localStorage.getItem("email");

document.getElementById("name").textContent = name || "Desconhecido";
document.getElementById("email").textContent = email || "Desconhecido";

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
