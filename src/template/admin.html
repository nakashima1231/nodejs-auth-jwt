<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    padding:40px;
}

table{
    border-collapse: collapse;
    width:500px;
    background:white;
}

th, td{
    padding:10px;
    border:1px solid #ccc;
}

th{
    background:#004D61;
    color:white;
}

button{
    background:#c0392b;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Usuários cadastrados</h2>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "admin"){
    window.location.href = "index.html";
}

function carregarUsuarios(){

fetch("/users",{
    headers:{
        "Authorization":"Bearer "+token
    }
})
.then(res=>res.json())
.then(users=>{

const table = document.getElementById("userTable");
table.innerHTML="";

users.forEach(user=>{

const row=document.createElement("tr");

row.innerHTML=`]
<td>${user.id}</td>
<td>${user.name}</td>
<td>${user.email}</td>
<td>
<button onclick="deletar(${user.id})">Excluir</button>
<button onclick="promover(${user.id})">Promover</button>
</td>
`;

table.appendChild(row);

});

});

}

function deletar(id){

    if(!confirm("Deseja deletar este usuário?")) return;

    fetch("/users/"+id,{
        method:"DELETE",
        headers:{
            "Authorization":"Bearer "+token
        }
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        carregarUsuarios();
    })
    .catch(err=>console.log(err));

}

function promover(id){

    if(!confirm("Promover este usuário para admin?")) return;

    fetch("/users/promote",{
        method:"PATCH",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body: JSON.stringify({ id:id })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        carregarUsuarios();
    })
    .catch(err=>console.log(err));

}

carregarUsuarios();

</script>

</body>
</html>
